# Default values for fixit-chart.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 2

app:
  name: fixit-app

image:
  repository: docker.io/maylot/fixit-build
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: v1

service:
  type: NodePort
  port: 8080
  targetPort: 8080
  nodePort: 30081
